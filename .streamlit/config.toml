# Aqualia Datathon — Streamlit theme
# Mirrors the React dashboard palette (navy / aqua / sand).

[theme]
primaryColor = "#5db9d9"
backgroundColor = "#f4f8fb"
secondaryBackgroundColor = "#ffffff"
textColor = "#0b1e3d"
font = "sans serif"
# Heavier custom CSS is injected from inside app.py to keep everything
# reproducible on Streamlit Community Cloud (no external stylesheets).

[server]
# Serve files from 07_streamlit/static/ at /app/static/<file>. Drop a
# looping mp4 at 07_streamlit/static/hero-video.mp4 to enable the hero
# video background — otherwise the CSS water ambience is used.
enableStaticServing = true
headless = true

[browser]
gatherUsageStats = false
